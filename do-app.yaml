name: slackbot-inference-hub
region: nyc
services:
  - name: slackbot-api
    # Socket Mode uses outbound WebSockets to Slack; no public slash-command URL is needed.
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    source_dir: /
    dockerfile_path: Dockerfile
    github:
      repo: REPLACE_WITH_YOUR_GITHUB_REPO
      branch: cursor/slackbot-inference-hub-setup-51e2
      deploy_on_push: true
    envs:
      - key: SLACK_APP_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: SLACK_BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: INFERENCE_HUB_MODEL_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      - key: INFERENCE_HUB_DEFAULT_AGENT
        scope: RUN_TIME
        type: SECRET
      - key: INFERENCE_HUB_BASE_URL
        scope: RUN_TIME
        value: https://inference.do-ai.run/v1
      - key: INFERENCE_HUB_SYSTEM_PROMPT
        scope: RUN_TIME
        value: You are a helpful assistant for a Slack workspace. Keep responses concise and actionable.
